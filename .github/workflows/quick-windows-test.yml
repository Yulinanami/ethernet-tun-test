name: Quick Windows Test Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional label for the test build"
        required: false

jobs:
  build-go:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    env:
      DEST: ${{ github.workspace }}/deployment/windows-amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
      - name: Cache Core Artifact
        id: cache-common
        uses: actions/cache@v4.2.3
        with:
          path: artifacts.tgz
          key: QuickCommonCache-windows-amd64-${{ hashFiles('script/build_go.sh', 'core/*') }}-1.25.8
      - name: Setup Go
        if: steps.cache-common.outputs.cache-hit != 'true'
        uses: actions/setup-go@v5.5.0
        with:
          go-version: "1.25.8"
          cache-dependency-path: |
            core/server/go.sum
      - name: Install Protoc
        if: steps.cache-common.outputs.cache-hit != 'true'
        run: |
          curl -LO "https://github.com/protocolbuffers/protobuf/releases/download/v31.1/protoc-31.1-linux-x86_64.zip"
          unzip "protoc-31.1-linux-x86_64.zip" -d protoc_install
          cp ./protoc_install/bin/protoc /usr/local/bin
      - name: Install protoc plugins
        if: steps.cache-common.outputs.cache-hit != 'true'
        run: |
          go install github.com/golang/protobuf/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
      - name: Build Go Core
        if: steps.cache-common.outputs.cache-hit != 'true'
        shell: bash
        run: |
          GOOS=windows GOARCH=amd64 ./script/build_go.sh
      - name: Archive Core Artifact
        if: steps.cache-common.outputs.cache-hit != 'true'
        run: tar czvf artifacts.tgz ./deployment
      - name: Upload Core Artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: Quick-${{ github.sha }}-Common-windows-amd64
          path: artifacts.tgz

  build-windows:
    permissions:
      contents: read
    needs:
      - build-go
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          submodules: recursive
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Download Core Artifact
        uses: actions/download-artifact@v4.3.0
        with:
          path: download-artifact
      - name: Build App
        shell: bash
        run: |
          curl -L -o qt.7z https://github.com/throneproj/buildqt/releases/download/Qt_6.11.0/Qt_6.11.0_x64.7z
          7z x qt.7z
          curl -L -o openssl.7z https://github.com/throneproj/env_windows_legacy/releases/download/latest/openssl_x64.7z
          7z x openssl.7z
          export CMAKE_PREFIX_PATH=$PWD/Qt/lib/cmake
          export OPENSSL_ROOT_DIR=$PWD/openssl
          mkdir build
          cd build
          curl -fLso srslist.h "https://raw.githubusercontent.com/throneproj/routeprofiles/rule-set/srslist.h"
          cmake -GNinja -DCMAKE_BUILD_TYPE=RelWithDebInfo ..
          ninja
          cd ..
          ./script/deploy_windows.sh
        env:
          DEST: ${{ github.workspace }}/deployment/windows-amd64
          DEST_SUFFIX: windows-amd64
      - name: Deploy Qt Runtime
        shell: cmd
        run: |
          set PATH=%CD%\Qt\bin;%PATH%
          where windeployqt
          pushd deployment\windows-amd64
          windeployqt --release Throne.exe --no-translations --no-system-d3d-compiler --no-opengl-sw --verbose 2
          if not exist Qt6Widgets.dll exit /b 1
          if not exist Qt6Core.dll exit /b 1
          if not exist Qt6Gui.dll exit /b 1
          if not exist platforms\qwindows.dll exit /b 1
          popd
      - name: Pack Runnable Zip
        shell: powershell
        run: |
          if (Test-Path deployment\windows-amd64\Throne.pdb) {
            Remove-Item deployment\windows-amd64\Throne.pdb -Force
          }
          if (Test-Path deployment\Throne-windows-amd64-runnable.zip) {
            Remove-Item deployment\Throne-windows-amd64-runnable.zip -Force
          }
          Compress-Archive -Path deployment\windows-amd64\* -DestinationPath deployment\Throne-windows-amd64-runnable.zip
      - name: Upload Runnable Zip
        uses: actions/upload-artifact@v4.6.2
        with:
          name: Quick-${{ github.sha }}-windows-amd64-runnable
          path: deployment/Throne-windows-amd64-runnable.zip
