name: Windows x64 Test Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Test build label"
        required: true

jobs:
  build-go:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
      - name: Cache Core Artifact
        id: cache-common
        uses: actions/cache@v4.2.3
        with:
          path: artifacts.tgz
          key: CommonCache-windows-amd64-${{ hashFiles('script/build_go.sh', 'core/*') }}-1.25.8
      - name: Setup Go
        if: steps.cache-common.outputs.cache-hit != 'true'
        uses: actions/setup-go@v5.5.0
        with:
          go-version: "1.25.8"
          cache-dependency-path: |
            core/server/go.sum
      - name: Install Protoc
        if: steps.cache-common.outputs.cache-hit != 'true'
        run: |
          curl -LO "https://github.com/protocolbuffers/protobuf/releases/download/v31.1/protoc-31.1-linux-x86_64.zip"
          unzip "protoc-31.1-linux-x86_64.zip" -d protoc_install
          cp ./protoc_install/bin/protoc /usr/local/bin
      - name: Install protoc plugins
        if: steps.cache-common.outputs.cache-hit != 'true'
        run: |
          go install github.com/golang/protobuf/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
      - name: Build Go Core
        if: steps.cache-common.outputs.cache-hit != 'true'
        shell: bash
        run: |
          GOOS=windows GOARCH=amd64 ./script/build_go.sh
      - name: Archive Core Artifact
        if: steps.cache-common.outputs.cache-hit != 'true'
        run: tar czvf artifacts.tgz ./deployment
      - name: Upload Core Artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: Throne-${{ github.sha }}-Common-windows-amd64
          path: artifacts.tgz

  build-windows-x64:
    permissions:
      contents: read
    needs:
      - build-go
    runs-on: windows-latest
    env:
      ACTIONS_ALLOW_UNSECURE_COMMANDS: true
      INPUT_VERSION: ${{ github.event.inputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          submodules: recursive
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1.13.0
        with:
          arch: x64
      - name: Download Core Artifact
        uses: actions/download-artifact@v4.3.0
        with:
          path: download-artifact
      - name: Set Vcpkg Root
        shell: powershell
        run: |
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Cache OpenSSL
        id: cache-openssl
        uses: actions/cache@v4.2.3
        with:
          path: C:/vcpkg/installed/x64-windows-static
          key: OpenSSLCache-windows-latest-x86_64
      - name: Install OpenSSL
        if: steps.cache-openssl.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          vcpkg install openssl:x64-windows-static
      - name: Cache Static Qt
        id: cache-static-qt
        uses: actions/cache@v4.2.3
        with:
          path: qt6/build
          key: QtStaticCache-windows-latest-x86_64-Qt6.10.2-${{ hashFiles('script/build_qt_static_windows.bat') }}
      - name: Build Static Qt
        if: steps.cache-static-qt.outputs.cache-hit != 'true'
        shell: cmd
        run: |
          ./script/build_qt_static_windows.bat 6.10.2
      - name: Build Windows x64
        shell: bash
        run: |
          export CMAKE_PREFIX_PATH=$PWD/qt6/build/lib/cmake
          export OPENSSL_ROOT_DIR="C:/vcpkg/installed/x64-windows-static"
          mkdir build
          cd build
          curl -fLso srslist.h "https://raw.githubusercontent.com/throneproj/routeprofiles/rule-set/srslist.h"
          cmake -GNinja -DCMAKE_BUILD_TYPE=Release ..
          ninja
          cd ..
          ./script/deploy_windows.sh
      - name: Pack Clean Windows Zip
        shell: powershell
        run: |
          if (Test-Path deployment\windows64\Throne.pdb) {
            Remove-Item deployment\windows64\Throne.pdb -Force
          }
          if (Test-Path deployment\Throne-windows64-portable.zip) {
            Remove-Item deployment\Throne-windows64-portable.zip -Force
          }
          Compress-Archive -Path deployment\windows64\* -DestinationPath deployment\Throne-windows64-portable.zip
      - name: Upload Windows Zip
        uses: actions/upload-artifact@v4.6.2
        with:
          name: Throne-${{ github.sha }}-windows-x64-clean
          path: deployment/Throne-windows64-portable.zip
